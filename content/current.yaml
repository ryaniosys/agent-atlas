    intro: "The hub agent is the orchestration center. All other repos are specialized spokes that share conventions, file paths, and data flows — but operate independently in their own Claude Code sessions."
    caption: "Fig 1 — Hub-and-spoke topology with key stats per repo"
  dependencies:
    caption: "Fig 2 — Directed data and skill flows between repos"
  email_pipeline:
    intro: "The primary intake funnel. Flagged emails are triaged by /organize-inbox into tickets (customer/project work) or TODO items (executive topics), using rule-based routing defined in rules.md."
    caption: "Fig 3 — Email intake and triage pipeline"
  filesystem:
    intro: "The repos don't share code — they share paths. Multiple agents read and write to the same directories under ~/Documents/shared/, with external APIs accessed by multiple repos in parallel."
    caption: "Fig 4 — Filesystem and API access patterns across repos"
