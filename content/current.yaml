primitives:
  - name: "CLAUDE.md → @AGENTS.md Redirect"
    description: "Every repo uses a one-line CLAUDE.md pointing to AGENTS.md. Separates the Claude Code hook from the actual instructions."
  - name: "Template-to-Local Config"
    description: "config.template.yaml (committed) → config.local.yaml (gitignored). Same for .env.template → .env. Secrets never leak while keeping structure documented."
  - name: "Skill-as-Folder"
    description: ".claude/skills/{name}/SKILL.md with optional scripts/, templates/, *.yaml. Single-purpose, self-documenting, composable."
  - name: "Tools as Pure Primitives, Logic in Prompts"
    description: "Data-access layers have zero business logic. Forecasting, health scoring, confidence intervals — all in SKILL.md files. The agent reasons; code just fetches."
  - name: "Solution Docs as Knowledge Base"
    description: "docs/solutions/{category}/{slug}.md — ~80 files. Each: problem → investigation → root cause → solution → gotchas."
  - name: "MCP for Auth, Scripts for Reliability"
    description: "MCP servers handle authentication; actual operations use direct API calls (Python scripts). Token reuse pattern enables scripts to piggyback on MCP auth."
  - name: "Self-Improvement Loop"
    description: "Use → Observe friction → Refine primitive → Document in tasks/lessons.md. After every correction, capture the lesson."
  - name: "Agent-Native Audit with Scoring"
    description: "Formal self-audits scoring 8 principles: Action Parity, CRUD Completeness, Context Injection, Prompt-Native, Tools as Primitives, Shared Workspace, UI Integration, Capability Discovery."
  - name: "Data Privacy Boundary Enforcement"
    description: "Three-tier: Committed (anonymized), Gitignored (customer data), Never leave machine (financial)."
  - name: "Dual-Calendar Pattern"
    description: "Business events go to both Outlook (Graph API) and Nextcloud B&T (CalDAV). Availability checks query both."
  - name: "Progressive Instruction Disclosure"
    description: "AGENTS.md (skim) → instructions/*.md (read) → docs/solutions/* (dive deep). Three layers for context window efficiency."

tensions:
  - name: "Dual HubSpot access"
    description: "personal-agent (MCP) and cso-agent (Python client) hit the same API without rate-limit coordination."
  - name: "Optiverser library/flow divergence"
    description: "Production-grade library scripts exist but aren't wired into the deployed flow (missing PII redaction, dedup, SSRF protection)."
  - name: "Venv inconsistency"
    description: "personal-agent: /tmp/ shared venv. cfo-agent: project-local .venv with uv. content-creator: per-skill venvs."
  - name: "Content-creator dual skill dirs"
    description: "skills/ (legacy) vs .claude/skills/ (slash commands) — some duplicated."
  - name: "Cross-agent integration is conceptual"
    description: "cso → cfo revenue forecast flow, cso → personal-agent TODO routing — documented but not automated."

